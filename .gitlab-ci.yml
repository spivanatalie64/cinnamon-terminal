---
# Cinnamon Terminal CI
# Builds cinnamon-terminal and packages it for Arch Linux, Flatpak, and Snap.
# Designed to run on the acreetionos Arch-based runner (acer-aspire-natalie).

stages:
  - build
  - package

variables:
  GIT_DEPTH: 50
  MESON_VERSION: "1.3.0"

# Run on master, cinnamon- branches, merge requests, and tags
.default_rules: &default_rules
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_BRANCH =~ /^cinnamon-/
  - if: $CI_COMMIT_TAG

#────────────── Stage: build ──────────────

build:linux:
  stage: build
  tags:
    - linux
  before_script:
    - sudo pacman -S --noconfirm --needed
      meson ninja gettext glib2 gtk4 libadwaita
      vte4 pcre2 gsettings-desktop-schemas
      libxslt itstool appstream-glib
  script:
    - meson setup build --prefix=/usr
      -Dbuildtype=release
      -Ddocs=true
      -Dnautilus_extension=true
      -Dsearch_provider=true
    - meson compile -C build
    - meson test -C build --verbose
  rules: *default_rules

#────────────── Stage: package ──────────────

# Arch Linux package (.pkg.tar.zst)
package:arch:
  stage: package
  needs: []
  tags:
    - linux
  before_script:
    - sudo pacman -S --noconfirm --needed
      meson ninja gettext glib2 gtk4 libadwaita
      vte4 pcre2 gsettings-desktop-schemas
      libxslt itstool appstream-glib
    - PKGVER="${CI_COMMIT_TAG#v}"; PKGVER="${PKGVER:-3.97.1}"
    - ln -sf "$CI_PROJECT_DIR" "../cinnamon-terminal-$PKGVER"
    - tar -chzf "cinnamon-terminal-$PKGVER.tar.gz" -C .. "cinnamon-terminal-$PKGVER"
    - rm -f "../cinnamon-terminal-$PKGVER"
  script:
    - makepkg -s --noconfirm
  artifacts:
    paths:
      - cinnamon-terminal-*.pkg.tar.zst
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Flatpak bundle (.flatpak)
package:flatpak:
  stage: package
  needs: []
  tags:
    - linux
  script:
    - flatpak-builder --system --force-clean flatpak-build flatpak/org.gnome.Terminal.json
    - flatpak build-bundle flatpak-build cinnamon-terminal.flatpak org.gnome.Terminal
  artifacts:
    paths:
      - cinnamon-terminal.flatpak
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_TAG

# Snap package (.snap)
# NOTE: Requires snapcraft. On Arch, install from AUR:
#   git clone https://aur.archlinux.org/snapd.git && cd snapd && makepkg -si
#   sudo systemctl enable --now snapd.socket
#   sudo ln -s /var/lib/snapd/snap /snap
#   sudo snap install snapcraft --classic
package:snap:
  stage: package
  needs: []
  tags:
    - linux
  before_script:
    - command -v snapcraft >/dev/null 2>&1 || { echo "snapcraft not installed — see docs in CI for setup"; exit 1; }
  script:
    - snapcraft --destructive-mode
  artifacts:
    paths:
      - cinnamon-terminal_*.snap
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
