---
# Cinnamon Terminal CI
# This CI builds cinnamon-terminal, tracks upstream gnome-terminal compatibility,
# and ensures the fork stays healthy.

stages:
  - build
  - test

variables:
  MESON_VERSION: "1.3.0"

.default_rules:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^gnome-/
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH =~ /^cinnamon-/

.build_template: &build_template
  stage: build
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq meson ninja-build gettext libglib2.0-dev
      libgtk-3-dev libgtk-4-dev libadwaita-1-dev libvte-2.91-dev
      libdconf-dev libpcre2-dev libsystemd-dev g++ pkg-config
      libxml2-utils xsltproc itstool appstream-util
  script:
    - meson setup build --prefix=/usr -Dbuildtype=release
    - meson compile -C build
  artifacts:
    paths:
      - build/
    expire_in: 1 week

build:linux:
  <<: *build_template
  rules:
    - !reference [.default_rules, rules]
  tags:
    - linux

test:linux:
  stage: test
  needs: ["build:linux"]
  script:
    - meson test -C build --verbose
  rules:
    - !reference [.default_rules, rules]
  tags:
    - linux
