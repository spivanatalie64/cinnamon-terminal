# Linting jobs
# Run static analysis and code quality checks

lint:clang-format:
  stage: lint
  needs: []
  script:
    - find src/ -name '*'.{c,cpp,h,hpp} -exec clang-format --dry-run --Werror {} +
  rules: *default_rules
  tags:
    - linux

lint:clang-tidy:
  stage: lint
  needs:
    - build:linux
  script:
    - clang-tidy src/*.c src/*.h src/*.cc src/*.cpp -- -Ibuild/ -Isrc/
  rules: *default_rules
  tags:
    - linux

lint:commit:
  stage: lint
  needs: []
  script:
    - gitlint --commits origin/$CI_DEFAULT_BRANCH..HEAD 2>&1 || echo "commit lint warnings (non-blocking)"
  rules:
    - if: $CI_MERGE_REQUEST_ID
  tags:
    - linux
