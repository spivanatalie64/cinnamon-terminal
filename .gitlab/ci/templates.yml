# Shared CI templates for Cinnamon Terminal
# Included by all CI jobs

.default_rules: &default_rules
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^gnome-/
    - if: $CI_COMMIT_BRANCH =~ /^cinnamon-/
    - if: $CI_COMMIT_BRANCH == "unstable"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG

.only_tag: &only_tag
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

.only_default: &only_default
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.schedule: &schedule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: manual
      allow_failure: true
